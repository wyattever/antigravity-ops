version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: acp-postgres
    environment:
      POSTGRES_DB: litellm_db
      POSTGRES_USER: litellm_admin
      POSTGRES_PASSWORD: sk-antigravity-db-pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm_admin -d litellm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: acp-gateway
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://litellm_admin:sk-antigravity-db-pass@db:5432/litellm_db
    ports:
      - "8000:8000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
      - ./acp_logging_handler.py:/app/acp_logging_handler.py
    entrypoint: /bin/sh -c "pip install uv && uv pip install psycopg2-binary --system && litellm --config /app/config.yaml --port 8000 --host 0.0.0.0 --detailed_debug"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
