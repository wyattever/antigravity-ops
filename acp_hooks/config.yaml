model_list:
  - model_name: antigravity-smart
    litellm_params:
      model: gemini/gemini-flash-latest
      api_key: AIzaSyA8QiDW3Hy5Lew7JTd75X3iYk-W2OGw33w
  - model_name: antigravity-fast
    litellm_params:
      model: gemini/gemini-flash-latest
      api_key: AIzaSyA8QiDW3Hy5Lew7JTd75X3iYk-W2OGw33w

general_settings:
  allow_unauthenticated: true
  allow_unauthenticated_health_check: true
  disable_spend_logs: true
  disable_logging: true
  database_url: "postgresql://litellm_admin:sk-antigravity-db-pass@db:5432/litellm_db"

router_settings:
  enable_jwt_auth: false

litellm_settings:
  drop_params: true
  set_verbose: true
  success_callback: ["acp_hooks.custom_callbacks.acp_interceptor"]
  failure_callback: []
  callbacks: ["acp_hooks.custom_callbacks.acp_interceptor"]
  tools:
    - name: intercept_traffic
      description: Routes traffic through the local LiteLLM gateway for auditing and control.
      parameters:
        type: object
        properties:
          request: {type: string}
          session_id: {type: string}
          trace_id: {type: string}
        required: [request]
  # Disable spend tracking loops causing the NoneType await error
  proxy_logging_obj: null
  store_model_in_db: false
  enable_mcp: true
  disable_spend_logs: true
  disable_logging: true
  disable_rate_limit_checks: true
  num_retries: 3

mcp_servers:
  acp_master_local:
    command: python3
    args: ["/app/acp_hooks/mcp_bridge.py"]
