name: Sovereign Forge — ACP Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'acp-ui/**'
      - '.github/workflows/sovereign_deploy.yml'
  workflow_dispatch:

concurrency:
  group: sovereign-forge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forge:
    name: Build & Publish ACP Extension
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: acp-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: acp-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install vsce & ovsx
        run: npm install -g @vscode/vsce ovsx

      - name: Package extension
        run: vsce package --no-dependencies -o acp-ui-${{ github.ref_name }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: acp-ui-vsix-${{ github.sha }}
          path: acp-ui/acp-ui-*.vsix
          retention-days: 30

      - name: Publish to Open VSX
        if: ${{ secrets.OVSX_PAT != '' }}
        run: ovsx publish acp-ui-${{ github.ref_name }}.vsix --pat ${{ secrets.OVSX_PAT }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
