<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Primary Control | v11.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&family=Roboto+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --google-blue: #1a73e8; --bg-gray: #f8f9fa; }
        body { 
            font-family: 'Roboto', sans-serif; background-color: var(--bg-gray); color: #3c4043;
            -webkit-font-smoothing: antialiased; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        .google-sans { font-family: 'Google Sans', sans-serif; }
        .mono { font-family: 'Roboto Mono', monospace; }
        .pulse-emerald { box-shadow: 0 0 8px rgba(24, 128, 56, 0.6); animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } }
        #chat-container { flex: 1; overflow-y: auto; padding: 1rem; background-color: #f1f3f4; display: flex; flex-direction: column; gap: 0.5rem; }
        .message-bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; margin-bottom: 4px; }
        .message-user { background-color: var(--google-blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message-agent { background-color: white; color: #3c4043; border: 1px solid #dadce0; align-self: flex-start; border-bottom-left-radius: 4px; }
        .safe-footer-buffer { height: 80px; background-color: white; }
        .typing-dots::after { content: '...'; animation: typing 1.5s infinite; }
        @keyframes typing { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
    </style>
</head>
<body class="flex flex-col">
    <!-- TOP NAV -->
    <nav class="bg-white border-b border-gray-200 px-4 py-3 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-emerald-600 pulse-emerald"></div>
            <h1 class="text-lg font-medium text-gray-800 tracking-tight google-sans">Primary <span class="text-blue-600">Control</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <span id="header-clock" class="text-xs mono text-gray-700 font-bold">--:-- MT</span>
            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-700 font-bold text-xs">G</div>
        </div>
    </nav>

    <!-- FORGE STRIP -->
    <div class="bg-white border-b border-gray-100 px-4 py-2 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-1"><i data-lucide="cpu" class="w-3 h-3 text-gray-400"></i><span class="text-[9px] font-bold text-gray-400 uppercase">M4 Ghost</span></div>
            <div class="flex items-center gap-1"><i data-lucide="cloud" class="w-3 h-3 text-blue-500"></i><span class="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">Sentinel v1.6</span></div>
        </div>
        <button id="ignite-btn" class="bg-blue-600 text-white text-[9px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest active:scale-95 transition-all">Ignite Forge</button>
    </div>

    <!-- CHAT INTERFACE -->
    <main id="chat-container">
        <div id="chat-messages" class="flex flex-col w-full">
            <div class="message-bubble message-agent">
                <strong>Primary v11.6</strong> active. The Brain is now wired to the LLM Gateway.
            </div>
        </div>
    </main>

    <!-- INPUT AREA WITH BUFFER -->
    <div class="bg-white border-t border-gray-200 p-3 shrink-0">
        <form id="chat-form" class="flex gap-2 max-w-screen-md mx-auto mb-2">
            <input type="text" id="user-input" placeholder="Message the Sentinel..." class="flex-1 bg-gray-100 border border-transparent focus:bg-white focus:border-blue-500 rounded-full px-5 py-3 text-sm outline-none transition-all">
            <button type="submit" class="bg-blue-600 text-white w-11 h-11 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-all"><i data-lucide="send" class="w-5 h-5"></i></button>
        </form>
        <div class="safe-footer-buffer"></div>
    </div>

    <script>
        const GATEWAY_URL = "https://litellm-gateway-319843614554.us-central1.run.app";
        const messagesContainer = document.getElementById('chat-messages');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');

        function updateClock() {
            const options = { timeZone: 'America/Denver', hour: '2-digit', minute: '2-digit', hour12: false };
            document.getElementById('header-clock').textContent = `${new Intl.DateTimeFormat('en-US', options).format(new Date())} MT`;
        }
        setInterval(updateClock, 1000); updateClock(); lucide.createIcons();

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message-bubble ${role === 'user' ? 'message-user' : 'message-agent'}`;
            div.textContent = text;
            messagesContainer.appendChild(div);
            document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
            return div;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;
            addMessage(text, 'user'); userInput.value = '';

            const loadingBubble = addMessage("Thinking", "agent");
            loadingBubble.classList.add('typing-dots');

            try {
                const response = await fetch(`${GATEWAY_URL}/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "gemini-2.0-flash",
                        messages: [{ role: "user", content: text }]
                    })
                });
                const data = await response.json();
                loadingBubble.classList.remove('typing-dots');
                if (data.choices && data.choices[0] && data.choices[0].message) {
                    loadingBubble.textContent = data.choices[0].message.content;
                } else if (data.error) {
                    loadingBubble.textContent = "Error: " + (data.error.message || JSON.stringify(data.error));
                } else {
                    loadingBubble.textContent = "Error: Unexpected response format.";
                }
            } catch (err) {
                loadingBubble.classList.remove('typing-dots');
                loadingBubble.textContent = "Error: Brain unreachable. Verify Cloud Run state.";
            }
        });

        // Forge Ignition
        document.getElementById('ignite-btn').addEventListener('click', () => {
            addMessage("MANDATE: Igniting the Forge...", "user");
            setTimeout(() => { addMessage("SUCCESS: Cloud build dispatched.", "agent"); }, 1000);
        });
    </script>
</body>
</html>
